<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Q25WGL1GDZ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-Q25WGL1GDZ');
  </script>
  <link rel="stylesheet" href="responsive.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8" />
  <title>Mi Agente OpenAI</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; }
    #chat { border: 1px solid #ddd; padding: 1rem; height: 400px; overflow-y: auto; }
    .mensaje { margin: .5rem 0; }
    .user { text-align: right; color: navy; }
    .bot  { text-align: left; color: darkgreen; }
  </style>
</head>
<body>
  <h1>Chat con mi Agente</h1>
  <div id="chat"></div>
  <form id="form">
    <input type="text" id="input" placeholder="Escribe..." autocomplete="off" style="width:80%" required />
    <button>Enviar</button>
  </form>

  <script>
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const chat = document.getElementById('chat');
    const AGENT_CHAT_KEY = 'iamarc_agent_chat_history';

    function appendMessage(text, cssClass) {
      const item = document.createElement('div');
      item.className = `mensaje ${cssClass}`;
      item.textContent = text;
      chat.appendChild(item);
    }

    function saveAgentHistory() {
      localStorage.setItem(AGENT_CHAT_KEY, chat.innerHTML);
    }

    function loadAgentHistory() {
      const saved = localStorage.getItem(AGENT_CHAT_KEY);
      if (saved) {
        chat.innerHTML = saved;
        chat.scrollTop = chat.scrollHeight;
      }
    }

    loadAgentHistory();
    window.addEventListener('progress-synced', loadAgentHistory);

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const texto = input.value.trim();
      if (!texto) return;

      // Mostrar tu mensaje
      appendMessage(texto, 'user');
      saveAgentHistory();
      input.value = '';

      // Llamada al servidor
      try {
        const resp = await fetch('http://localhost:3000/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mensaje: texto })
        });
        const data = await resp.json();

        appendMessage(data.respuesta, 'bot');
        saveAgentHistory();

        // Scroll al final
        chat.scrollTop = chat.scrollHeight;
      } catch (err) {
        console.error(err);
      }
    });
  </script>
  <script src="../../progress-sync.js"></script>
  <script src="touch-controls.js"></script>
</body>
</html>
