<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VIRUS</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            background: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        button {
            padding: 20px 40px;
            font-size: 24px;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            font-weight: bold;
        }
    </style>
</head>
<body>
    <button onclick="infectar()">🦠 INFECTAR 🦠</button>

    <script>
        function infectar() {
            // SONIDO PRINCIPAL - MÚLTIPLES FRECUENCIAS
            function crearSonido() {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc1 = audioCtx.createOscillator();
                const osc2 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                const gain2 = audioCtx.createGain();
                
                osc1.type = 'sine';
                osc2.type = 'sine';
                osc1.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc2.frequency.setValueAtTime(1000, audioCtx.currentTime);
                
                gain1.gain.setValueAtTime(1, audioCtx.currentTime);
                gain2.gain.setValueAtTime(1, audioCtx.currentTime);
                
                osc1.connect(gain1);
                osc2.connect(gain2);
                gain1.connect(audioCtx.destination);
                gain2.connect(audioCtx.destination);
                
                osc1.start();
                osc2.start();
                
                setTimeout(() => {
                    osc1.stop();
                    osc2.stop();
                }, 2000);
            }
            
            crearSonido();

            // ABRIR 3 VENTANAS VIRUS
            for(let i = 0; i < 3; i++) {
                setTimeout(() => abrirVirus(), i * 200);
            }
            
            // CAMBIAR PÁGINA PRINCIPAL
            document.body.innerHTML = `
                <div style="color:red;font-size:50px;text-align:center;padding-top:100px;font-weight:bold;">
                    💀 SISTEMA INFECTADO 💀<br>
                    <span id="countdown">2</span>s
                </div>
            `;
            
            let count = 2;
            const interval = setInterval(() => {
                count--;
                document.getElementById('countdown').textContent = count + 's';
                if(count <= 0) {
                    clearInterval(interval);
                }
            }, 1000);
        }

        function abrirVirus() {
            const virus = window.open('', 'virus', 'width=900,height=700');
            
            virus.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <title>ERROR CRÍTICO</title>
                    <style>
                        * {margin:0;padding:0;user-select:none;}
                        body {
                            background:black;
                            color:#ff0000;
                            font-family:'Courier New',monospace;
                            overflow:hidden;
                            height:100vh;
                            display:flex;
                            flex-direction:column;
                            justify-content:center;
                            align-items:center;
                            font-size:28px;
                        }
                        .titulo {font-size:60px;margin-bottom:30px;animation:pulso 0.3s infinite;}
                        .contador {font-size:100px;font-weight:bold;margin:20px;}
                        .texto {margin:10px;font-size:22px;}
                        @keyframes pulso {
                            0%,100%{transform:scale(1);color:#ff0000;}
                            50%{transform:scale(1.05);color:#ff6666;}
                        }
                        canvas {position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;}
                    </style>
                </head>
                <body>
                    <canvas id="trap"></canvas>
                    <div class="titulo">🔴 VIRUS ACTIVADO 🔴</div>
                    <div class="contador" id="timer">2</div>
                    <div class="texto">ALT+F4 BLOQUEADO</div>
                    <div class="texto">CTRL+W BLOQUEADO</div>
                    <div class="texto">ESCAPE BLOQUEADO</div>

                    <script>
                        // SONIDO EN CADA VENTANA
                        try {
                            const ctx = new (window.AudioContext || window.webkitAudioContext)();
                            const tono = ctx.createOscillator();
                            const volumen = ctx.createGain();
                            tono.frequency.value = 850;
                            volumen.gain.value = 1;
                            tono.connect(volumen);
                            volumen.connect(ctx.destination);
                            tono.start();
                            setTimeout(()=>tono.stop(),2000);
                        } catch(e) {}

                        // BLOQUEO TOTAL
                        document.onkeydown = document.onkeyup = document.onkeypress = function(e) {
                            e.preventDefault();
                            e.stopPropagation();
                            return false;
                        };

                        document.onmousedown = document.onmouseup = document.onmousemove = function(e) {
                            e.preventDefault();
                            return false;
                        };

                        document.oncontextmenu = function(e) {e.preventDefault();return false;};

                        // POINTER LOCK
                        const canvas = document.getElementById('trap');
                        canvas.width = screen.width;
                        canvas.height = screen.height;
                        if(canvas.requestPointerLock) canvas.requestPointerLock();

                        // COUNTDOWN
                        let t = 2;
                        const timer = document.getElementById('timer');
                        const intv = setInterval(()=>{
                            t--;
                            timer.textContent = t;
                            if(t<=0){
                                clearInterval(intv);
                                window.close();
                            }
                        },1000);

                        // ANTI-CIERRE
                        window.onbeforeunload = function(){return'ERROR SISTEMA';};
                    </script>
                </body>
                </html>
            `);
            
            virus.document.close();
            virus.focus();
            virus.blur();
        }

        // BLOQUEO PREVENTIVO
        document.addEventListener('keydown', function(e){
            e.preventDefault();
        }, true);
    </script>
</body>
</html>
